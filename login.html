<!DOCTYPE html>

<body>
    <script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let saved = localStorage.getItem("user_" + u);

  if(saved && saved === p){
    localStorage.setItem("currentUser", u);
    window.location.href = "profil.html";
  } else {
    alert("Ошибка входа");
  }
}
</script>
</body>
</html>
